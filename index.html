<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trainingsplan</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1923; color: #fff; min-height: 100vh; padding-bottom: 60px; }

/* HEADER */
.header { background: #1F4E79; padding: 16px 18px 12px; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 16px rgba(0,0,0,0.5); }
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; font-weight: 700; }
.header-sub { font-size: 11px; color: #90b8d8; margin-top: 2px; }
.history-btn { background: rgba(255,255,255,0.12); border: none; color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: 600; }

/* TABS */
.tabs { display: flex; overflow-x: auto; background: #162535; border-bottom: 2px solid #1a3a58; scrollbar-width: none; position: sticky; top: 56px; z-index: 199; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 11px 20px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; margin-bottom: -2px; color: #6a8ea8; transition: all 0.2s; }
.tab.active { color: #fff; border-bottom-color: #2E75B6; background: #1a2f42; }
.tab.complete-tab { color: #70AD47; }
.tab.complete-tab.active { border-bottom-color: #70AD47; }

/* TIMER OVERLAY */
.timer-overlay { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 300; background: linear-gradient(180deg, rgba(15,25,35,0) 0%, #0f1923 30%); padding: 20px 16px 30px; }
.timer-overlay.visible { display: block; }
.timer-card { background: linear-gradient(135deg, #1F4E79, #163a5a); border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 -4px 30px rgba(0,0,0,0.6); border: 1px solid #2E75B6; }
.timer-circle { width: 64px; height: 64px; border-radius: 50%; background: conic-gradient(#2E75B6 0deg, #243d54 0deg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
.timer-circle-inner { width: 52px; height: 52px; border-radius: 50%; background: #1a2f42; display: flex; align-items: center; justify-content: center; }
.timer-num { font-size: 17px; font-weight: 700; color: #fff; }
.timer-info { flex: 1; }
.timer-label { font-size: 13px; font-weight: 600; color: #90b8d8; }
.timer-sub { font-size: 11px; color: #5a8ab0; margin-top: 2px; }
.timer-actions { display: flex; gap: 8px; }
.timer-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; }
.timer-btn.skip { background: #2E75B6; }
.timer-done { background: #70AD47 !important; }

/* CONTENT */
.content { padding: 14px 13px; max-width: 560px; margin: 0 auto; }

/* DAY HEADER */
.day-header { background: linear-gradient(135deg, #1F4E79, #2E75B6); border-radius: 12px; padding: 15px 18px; margin-bottom: 12px; }
.day-header h2 { font-size: 17px; font-weight: 700; }
.day-header p { font-size: 12px; color: #b8d4ec; margin-top: 3px; }
.day-progress { margin-top: 10px; background: rgba(255,255,255,0.15); border-radius: 20px; height: 5px; }
.day-progress-bar { height: 100%; background: #70AD47; border-radius: 20px; transition: width 0.4s ease; }

/* STATS */
.stats-row { display: flex; gap: 8px; margin-bottom: 12px; }
.stat-box { flex: 1; background: #1a2f42; border-radius: 10px; padding: 10px 6px; text-align: center; }
.stat-num { font-size: 19px; font-weight: 700; color: #2E75B6; }
.stat-label { font-size: 10px; color: #5a8ab0; margin-top: 1px; }

.section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #5a8ab0; margin: 14px 0 7px; }
.rest-info { background: #162535; border-radius: 8px; padding: 8px 12px; margin-bottom: 10px; font-size: 11px; color: #5a8ab0; }

/* EXERCISE CARD */
.exercise-card { background: #1a2f42; border-radius: 12px; margin-bottom: 9px; overflow: hidden; border: 1px solid #243d54; transition: border-color 0.2s; }
.exercise-card.all-done { border-color: #70AD47; background: #162b1e; }

.exercise-header { display: flex; align-items: flex-start; gap: 12px; padding: 13px 14px 11px; cursor: pointer; }
.ex-title-wrap { flex: 1; min-width: 0; }
.ex-name { font-size: 14px; font-weight: 600; color: #e8f0f8; line-height: 1.3; }
.exercise-card.all-done .ex-name { color: #70AD47; text-decoration: line-through; opacity: 0.85; }
.ex-meta { font-size: 11px; color: #5a8ab0; margin-top: 2px; }
.exercise-card.all-done .ex-meta { color: #3a6a3a; }
.ex-chevron { font-size: 11px; color: #3a5a78; margin-top: 2px; flex-shrink: 0; transition: transform 0.2s; }
.exercise-card.expanded .ex-chevron { transform: rotate(180deg); }

/* SETS CONTAINER */
.sets-container { padding: 0 13px 12px; display: none; }
.exercise-card.expanded .sets-container { display: block; }

.ex-instructions { background: #162535; border-radius: 8px; padding: 9px 11px; margin-bottom: 10px; font-size: 12px; color: #7aadcc; line-height: 1.5; border-left: 3px solid #2E75B6; }
.ex-instructions strong { color: #90c8e8; display: block; margin-bottom: 3px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

.prev-best { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #4a7a9a; background: #162535; border-radius: 7px; padding: 5px 9px; margin-bottom: 8px; }
.prev-best .pr-badge { background: #c8860a; color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 10px; }

.set-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; background: #162535; border-radius: 8px; padding: 8px 10px; border: 1px solid #243d54; transition: all 0.2s; }
.set-row.set-done { background: #162b1e; border-color: #70AD47; }

.set-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #3a5a78; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.2s; }
.set-row.set-done .set-check { background: #70AD47; border-color: #70AD47; }
.set-check svg { opacity: 0; transition: opacity 0.15s; }
.set-row.set-done .set-check svg { opacity: 1; }

.set-label { font-size: 11px; font-weight: 700; color: #6a8ea8; width: 34px; flex-shrink: 0; }
.set-row.set-done .set-label { color: #70AD47; }

.set-inputs { display: flex; gap: 6px; flex: 1; }
.set-input-wrap { flex: 1; }
.set-input-label { font-size: 9px; color: #4a6a80; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.set-input { width: 100%; background: #1F4E79; border: 1px solid #2a5070; border-radius: 6px; color: #fff; font-size: 14px; font-weight: 600; padding: 5px 6px; text-align: center; outline: none; }
.set-input:focus { border-color: #4a90c8; }
.set-row.set-done .set-input { background: #1a3a1a; border-color: #3a6a3a; color: #70AD47; }
.set-input::placeholder { color: #3a5a78; font-weight: 400; font-size: 12px; }
.set-target { font-size: 9px; color: #3a5a78; text-align: center; margin-top: 1px; }
.pr-star { font-size: 14px; margin-left: 2px; }

/* NOTES */
.notes-section { margin-top: 14px; }
.notes-section label { font-size: 11px; font-weight: 700; color: #5a8ab0; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 6px; }
.notes-textarea { width: 100%; background: #1a2f42; border: 1px solid #243d54; border-radius: 10px; color: #c8dff0; font-size: 13px; padding: 10px 12px; outline: none; resize: none; height: 70px; font-family: inherit; line-height: 1.5; }
.notes-textarea:focus { border-color: #2E75B6; }
.notes-textarea::placeholder { color: #3a5a78; }

/* SUMMARY */
.summary-card { background: #1a2f42; border-radius: 12px; padding: 20px; margin-top: 10px; text-align: center; }
.summary-card.complete { background: linear-gradient(135deg, #1a3a1a, #1e4020); border: 1px solid #70AD47; }
.summary-emoji { font-size: 38px; margin-bottom: 8px; }
.summary-title { font-size: 16px; font-weight: 700; }
.summary-sub { font-size: 12px; color: #6a8ea8; margin-top: 4px; }
.summary-card.complete .summary-sub { color: #70AD47; }
.reset-btn { margin-top: 12px; background: #243d54; border: none; color: #7a9bb5; padding: 8px 20px; border-radius: 20px; font-size: 13px; cursor: pointer; display: inline-block; }

/* HISTORY PANEL */
.history-panel { display: none; position: fixed; inset: 0; z-index: 400; background: #0f1923; overflow-y: auto; }
.history-panel.visible { display: block; }
.history-header { background: #1F4E79; padding: 16px 18px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; }
.history-header h2 { font-size: 17px; font-weight: 700; flex: 1; }
.close-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.history-content { padding: 16px 14px; max-width: 560px; margin: 0 auto; }
.history-section { margin-bottom: 20px; }
.history-section h3 { font-size: 13px; font-weight: 700; color: #2E75B6; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #243d54; }
.history-ex { margin-bottom: 10px; }
.history-ex-name { font-size: 12px; font-weight: 600; color: #90b8d8; margin-bottom: 4px; }
.history-rows { display: flex; flex-direction: column; gap: 3px; }
.history-row { display: flex; justify-content: space-between; font-size: 11px; color: #6a8ea8; background: #1a2f42; padding: 5px 10px; border-radius: 6px; }
.history-row .date { color: #4a6a80; }
.history-row .val { color: #90c8e8; font-weight: 600; }
.history-row .pr { color: #c8860a; }
.no-history { font-size: 13px; color: #4a6a80; text-align: center; padding: 40px 20px; }

/* REST DAY */
.rest-day { text-align: center; padding: 60px 16px; }
.rest-day .icon { font-size: 52px; margin-bottom: 14px; }
.rest-day h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.rest-day p { font-size: 13px; color: #5a8ab0; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <h1>💪 Trainingsplan</h1>
      <div class="header-sub" id="headerSub">Wähle ein Training</div>
    </div>
    <button class="history-btn" onclick="showHistory()">📊 Verlauf</button>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>

<!-- Timer -->
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-card">
    <div class="timer-circle" id="timerCircle">
      <div class="timer-circle-inner">
        <div class="timer-num" id="timerNum">3:00</div>
      </div>
    </div>
    <div class="timer-info">
      <div class="timer-label" id="timerLabel">Pause – nächster Satz</div>
      <div class="timer-sub" id="timerSub">3 Min. Pause für maximale Hypertrophie</div>
    </div>
    <div class="timer-actions">
      <button class="timer-btn" onclick="stopTimer()">✕</button>
      <button class="timer-btn skip" onclick="skipTimer()">Weiter</button>
    </div>
  </div>
</div>

<!-- History Panel -->
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <h2>📊 Trainingshistorie</h2>
    <button class="close-btn" onclick="hideHistory()">✕</button>
  </div>
  <div class="history-content" id="historyContent"></div>
</div>

<script>
// ── PLAN DATA ────────────────────────────────────────────────
const TRAININGS = ["T1","T2","T3"];
const TNAMES    = ["Training 1","Training 2","Training 3"];

const plan = {
  T1: {
    label: "Training 1 – Gym",
    focus: "Schultern · Brust · Trizeps",
    duration: "~55 Min.",
    note: "3 Min. Pause zwischen Sätzen · Bis Muskelversagen",

        ]

      {

          "Kabel auf unterster Position einstellen",

        ]
      },
      {
        name: "Incline Maschinen-Press (30°)",
        sets: 3, reps: "8–12",
        instructions: [
          "Rückenlehne auf 30° einstellen (nicht 45° – 30° ist optimal für obere Brust)",
          "Ellbogen ca. 75° zum Körper – nicht komplett nach außen",

      },
      {
        name: "Pec Deck / Cable Fly",
        sets: 2, reps: "12–15",
        instructions: [
          "Arme leicht gebeugt halten – nie strecken",
          "Maximale Dehnung am Endpunkt (Arme weit hinten)",

      {
        name: "Cable Overhead Tricep Extension",
        sets: 2, reps: "12–15",
        instructions: [
          "Seilgriff verwenden – Kabel oben einstellen",
          "Ellbogen eng am Kopf halten – nicht nach außen driften lassen",
          "Volle Streckung am Ende – kurz halten",
          "Langsam zurück ohne Ellbogen zu verschieben",
          "Trainiert: langen Trizepskopf maximal (wissenschaftlich superior)"
        ]
      },
    ]
  },
  T2: {
    label: "Training 2 – Gym",
    focus: "Rücken · Bizeps · hint. Schulter · Falle",
    duration: "~58 Min.",
    note: "Kein Langhantelrudern (LWS-Schutz) · Nur Kabel + Maschinen",
    exercises: [
      {
        name: "Lat Pulldown (weiter pronierter Griff)",
        sets: 3, reps: "8–12",
        instructions: [
          "Weiter, pronierter Griff (Handrücken nach oben)",
          "Stange zur oberen Brust ziehen – NICHT hinter den Kopf",
          "Schulterblätter aktiv nach unten ziehen bevor du ziehst",
          "Langsam zurück bis volle Streckung – Lat dehnen",
          "Trainiert: Latissimus dorsi – beste Rückenbreite-Übung"
        ]
      },
      {
        name: "Seated Cable Row (enger Griff)",
        sets: 3, reps: "10–12",
        instructions: [
          "Aufrechter Oberkörper – kein Vor- und Zurückschaukeln",
          "Schulterblätter vor jedem Satz aktiv einziehen",
          "Zum Bauch ziehen, Ellbogen eng am Körper",
          "Kurz halten wenn Schulterblätter zusammen sind",
          "Trainiert: mittlere Falle, Rhomboiden – gut für Haltung"
        ]
      },
      {
        name: "Reverse Pec Deck (neutraler Griff)",
        sets: 2, reps: "15–20",
        instructions: [
          "WICHTIG: Neutraler Griff – Daumen nach oben zeigen lassen",
          "Nicht proniert (Handrücken oben) – das reduziert die Aktivierung",
          "Arme leicht gebeugt, weite Bewegung nach hinten",
          "Langsam zurück – exzentrische Phase kontrollieren",
          "Trainiert: hinterer Deltamuskel – essenziell für Haltung bei Schreibtischarbeit"
        ]
      },
      {
        name: "Incline Dumbbell Curl",
        sets: 2, reps: "10",
        instructions: [
          "Bank auf 45–60° einstellen – Schulter kommt hinter den Körper",
          "Diese Position dehnt den langen Bizepskopf maximal",
          "Arm hängen lassen, dann langsam curl – Ellbogen bleibt unten",
          "3 Sek. exzentrisch ablassen für maximalen Reiz",
          "Trainiert: langen Bizepskopf (Bizepsgipfel) – wissenschaftlich superior"
        ]
      },
      {
        name: "Preacher Curl (Maschine)",
        sets: 2, reps: "10",
        instructions: [
          "Oberarm vollständig auf der Ablage – kein Abheben",
          "Volle Streckung am Ende (kurzen Bizepskopf maximal dehnen)",
          "Bis zur vollen Kontraktion curlen – kurz halten",
          "3 Sek. ablassen",
          "Trainiert: kurzen Bizepskopf (Breite) – komplementär zu Incline Curl"
        ]
      },
      {
        name: "Kurzhantel-Shrugs",
        sets: 2, reps: "12–15",
        instructions: [
          "Hanteln seitlich am Körper, Arme gestreckt",
          "Schultern gerade nach oben ziehen – nicht rotieren",
          "Oben kurz 1–2 Sek. halten",
          "Langsam und vollständig absenken",
          "Trainiert: obere Falle – für den 'yoked' Look zwischen Hals und Schultern"
        ]
      },
    ]
  },
  T3: {
    label: "Training 3 – Zuhause",
    focus: "Schultern · Arme · Brust · Core",
    duration: "~42 Min.",
    note: "Kurzhanteln (max. 25 kg) · Klimmzugstange · Dip-Barren",
    exercises: [
      {
        name: "KH-Schulterdrücken (sitzend)",
        sets: 3, reps: "8–12",
        instructions: [
          "Aufrecht sitzen, Rücken gerade – kein Hohlkreuz",
          "Hanteln auf Schulterhöhe starten, Handflächen nach vorne",
          "Kontrolliert drücken bis fast zur vollen Streckung",
          "Langsam absenken – volle Kontrolle",
          "Falls 25 kg zu leicht: Wiederholungen auf 15–20 erhöhen"
        ]
      },
      {
        name: "KH Lateral Raise",
        sets: 2, reps: "12–15",
        instructions: [
          "Arm leicht gebeugt halten (ca. 10–15°)",
          "Daumen leicht nach unten drehen beim Heben",
          "Bis Schulterniveau – nicht höher",
          "Exzentrik langsam (2–3 Sek. ablassen)",
          "Bis zum Muskelversagen – trainiert lateralen Deltamuskel"
        ]
      },
      {
        name: "Chest Dips (~30° vorgeneigt)",
        sets: 2, reps: "Max.",
        instructions: [
          "Oberkörper ca. 30° nach vorne neigen – Brust über Händen",
          "Tief absenken bis starke Dehnung in der Brust spürbar",
          "Ellbogen zeigen leicht nach außen",
          "Kontrolliert drücken – nicht hochschnellen",
          "Trainiert: untere Brust unter tiefer Dehnung – einzigartig"
        ]
      },
      {
        name: "Klimmzüge (Untergriff)",
        sets: 2, reps: "Max.",
        instructions: [
          "Untergriff (Handflächen zu dir) – schulterbreit",
          "Volle Streckung unten abwarten bevor nächste Wdh.",
          "Kinn über die Stange bringen",
          "Langsam ablassen – exzentrische Phase nutzen",
          "Untergriff betont den Bizeps zusätzlich"
        ]
      },
      {
        name: "Overhead Tricep Extension (KH)",
        sets: 2, reps: "12–15",
        instructions: [
          "Beide Hände um eine Hantel greifen",
          "Hantel über den Kopf heben, Ellbogen eng am Kopf",
          "Absenken bis starke Dehnung im Trizeps – dann strecken",
          "Ellbogen nicht nach außen driften lassen",
          "Trainiert: langen Trizepskopf maximal (overhead superior)"
        ]
      },
      {
        name: "KH Curl (sitzend)",
        sets: 2, reps: "10",
        instructions: [
          "Sitzend, Ellbogen am Körper fixiert",
          "Alternierend oder zusammen – beides ok",
          "3 Sek. exzentrisch ablassen – sehr wichtig für Wachstum",
          "Volle Streckung unten bevor nächste Wdh.",
          "Kontrolliert – kein Schwung"
        ]
      },
      {
        name: "Plank",
        sets: 2, reps: "30–45 Sek.",
        instructions: [
          "Unterarme auf dem Boden, Ellbogen unter den Schultern",
          "Körper bildet eine gerade Linie – kein Hohlkreuz, kein Hintern hoch",
          "Bauch aktiv anspannen – nicht einfach 'hängen'",
          "Atmen! Ruhige, gleichmäßige Atemzüge",
          "Stabilisiert LWS – wichtig bei Rückenproblemen (McGill 2015)"
        ]
      },
    ]
  }
};

// ── STATE ───────────────────────────────────────────────
let state   = {}; // state[T][date][ei][si] = {done, kg, reps}
let expanded = {};
let notes   = {}; // notes[T][date] = string
let activeT = "T1";

const TODAY = new Date().toISOString().slice(0,10);

function load() {
  try { state   = JSON.parse(localStorage.getItem('tp3_state')   || '{}'); } catch(e){}
  try { notes   = JSON.parse(localStorage.getItem('tp3_notes')   || '{}'); } catch(e){}
}
function save() {
  try { localStorage.setItem('tp3_state', JSON.stringify(state)); } catch(e){}
  try { localStorage.setItem('tp3_notes', JSON.stringify(notes)); } catch(e){}
}

function getSet(t, ei, si, date=TODAY) {
  return (state[t] && state[t][date] && state[t][date][ei] && state[t][date][ei][si]) || {done:false,kg:'',reps:''};
}
function setSetData(t, ei, si, data, date=TODAY) {
  if (!state[t])              state[t]              = {};
  if (!state[t][date])        state[t][date]        = {};
  if (!state[t][date][ei])    state[t][date][ei]    = {};
  state[t][date][ei][si] = {...getSet(t,ei,si,date), ...data};
  save();
}

function totalSets(t)  { return plan[t].exercises.reduce((a,e)=>a+e.sets,0); }
function doneSetsCount(t, date=TODAY) {
  let n=0;
  plan[t].exercises.forEach((ex,ei)=>{ for(let s=0;s<ex.sets;s++) if(getSet(t,ei,s,date).done) n++; });
  return n;
}
function allExDone(t, ei, date=TODAY) {
  return plan[t].exercises[ei].sets === Array.from({length:plan[t].exercises[ei].sets},(_,s)=>getSet(t,ei,s,date).done).filter(Boolean).length;
}
function doneExCount(t, date=TODAY) {
  return plan[t].exercises.filter((_,i)=>allExDone(t,i,date)).length;
}

// PR detection: is current kg > all previous sessions?
function isPR(t, ei, si, newKg) {
  if (!newKg || isNaN(parseFloat(newKg))) return false;
  const cur = parseFloat(newKg);
  const dates = Object.keys(state[t]||{}).filter(d=>d!==TODAY).sort();
  for (const d of dates) {
    const s = (state[t][d] && state[t][d][ei] && state[t][d][ei][si]);
    if (s && s.kg && parseFloat(s.kg) >= cur) return false;
  }
  return dates.length > 0;
}

// Get history for an exercise
function getExHistory(t, ei) {
  const dates = Object.keys(state[t]||{}).sort().reverse().slice(0,6);
  return dates.map(d => {
    const sets = [];
    const ex = plan[t].exercises[ei];
    for (let s=0;s<ex.sets;s++) {
      const st = state[t][d] && state[t][d][ei] && state[t][d][ei][s];
      if (st && st.done && st.kg) sets.push(`${st.kg}kg×${st.reps||'?'}`);
    }
    return sets.length ? {date:d, val:sets.join(', ')} : null;
  }).filter(Boolean);
}

// Last best for prev-best display
function getLastBest(t, ei) {
  const dates = Object.keys(state[t]||{}).filter(d=>d!==TODAY).sort().reverse();
  for (const d of dates) {
    const ex = plan[t].exercises[ei];
    let best = null;
    for (let s=0;s<ex.sets;s++) {
      const st = state[t][d] && state[t][d][ei] && state[t][d][ei][s];
      if (st && st.done && st.kg) { best = st; break; }
    }
    if (best) return {kg:best.kg, reps:best.reps, date:d};
  }
  return null;
}

// ── TIMER ───────────────────────────────────────────────
let timerInterval = null;
let timerSeconds  = 180;

function startTimer() {
  stopTimer();
  timerSeconds = 180;
  updateTimerDisplay();
  document.getElementById('timerOverlay').classList.add('visible');
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      stopTimer();
      playBeep();
      document.getElementById('timerLabel').textContent = '✅ Pause vorbei – nächster Satz!';
      document.getElementById('timerOverlay').classList.add('visible');
      setTimeout(()=>{ document.getElementById('timerOverlay').classList.remove('visible'); }, 4000);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds/60);
  const s = timerSeconds % 60;
  document.getElementById('timerNum').textContent = `${m}:${String(s).padStart(2,'0')}`;
  const pct = (1 - timerSeconds/180) * 360;
  document.getElementById('timerCircle').style.background =
    `conic-gradient(#2E75B6 ${pct}deg, #243d54 ${pct}deg)`;
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval=null; }
  document.getElementById('timerOverlay').classList.remove('visible');
}
function skipTimer() { stopTimer(); }

function playBeep() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.15,0.3].forEach(t => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.2);
      o.start(ctx.currentTime+t);
      o.stop(ctx.currentTime+t+0.2);
    });
    if (navigator.vibrate) navigator.vibrate([200,100,200]);
  } catch(e){}
}

// ── TABS ────────────────────────────────────────────────
function renderTabs() {
  document.getElementById('tabs').innerHTML = TRAININGS.map((t,i) => {
    const done = doneExCount(t) === plan[t].exercises.length;
    return `<div class="tab ${t===activeT?'active':''} ${done?'complete-tab':''}" onclick="setT('${t}')">
      ${TNAMES[i]}${done?' ✓':''}
    </div>`;
  }).join('');
}
function setT(t) { activeT=t; renderTabs(); renderContent(); }

// ── CONTENT ─────────────────────────────────────────────
function renderContent() {
  const t  = activeT;
  const d  = plan[t];
  document.getElementById('headerSub').textContent = `${d.label}`;

  const ts  = totalSets(t), ds = doneSetsCount(t);
  const de  = doneExCount(t), te = d.exercises.length;
  const pct = ts>0 ? Math.round(ds/ts*100) : 0;
  const allComplete = de===te;

  let html = `
    <div class="day-header">
      <h2>🏋️ ${d.label}</h2>
      <p>${d.focus} · ${d.duration}</p>
      <div class="day-progress"><div class="day-progress-bar" style="width:${pct}%"></div></div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num">${de}/${te}</div><div class="stat-label">Übungen</div></div>
      <div class="stat-box"><div class="stat-num">${ds}/${ts}</div><div class="stat-label">Sätze</div></div>
      <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-label">Fertig</div></div>
    </div>
    <div class="rest-info">⏱ ${d.note}</div>
    <div class="section-label">Übungen – tippe zum Aufklappen</div>`;

  d.exercises.forEach((ex, ei) => {
    const isExp   = !!expanded[t+ei];
    const isDone  = allExDone(t, ei);
    const doneS   = Array.from({length:ex.sets},(_,s)=>getSet(t,ei,s).done).filter(Boolean).length;
    const prev    = getLastBest(t, ei);

    // instructions
    const instrHtml = `<div class="ex-instructions">
      <strong>Ausführung</strong>
      ${ex.instructions.map(i=>`• ${i}`).join('<br>')}
    </div>`;

    // prev best
    let prevHtml = '';
    if (prev) {
      prevHtml = `<div class="prev-best">
        📅 ${prev.date}: <strong style="color:#90c8e8">${prev.kg} kg × ${prev.reps||'?'} Wdh.</strong>
        <span class="pr-badge">Ziel: übertreffen!</span>
      </div>`;
    }

    // sets
    let setsHtml = '';
    for (let si=0; si<ex.sets; si++) {
      const st = getSet(t,ei,si);
      const pr = st.done && st.kg && isPR(t,ei,si,st.kg);
      setsHtml += `
        <div class="set-row ${st.done?'set-done':''}" id="sr-${ei}-${si}">
          <div class="set-check" onclick="toggleSet('${t}',${ei},${si})">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
              <path d="M2 7l3.5 3.5L12 3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="set-label">Satz ${si+1}</div>
          <div class="set-inputs">
            <div class="set-input-wrap">
              <div class="set-input-label">Gewicht</div>
              <input class="set-input" type="number" inputmode="decimal" placeholder="kg"
                value="${st.kg||''}"
                onchange="updateSet('${t}',${ei},${si},'kg',this.value)"
                oninput="updateSet('${t}',${ei},${si},'kg',this.value)">
              <div class="set-target">Ziel: ${ex.reps}</div>
            </div>
            <div class="set-input-wrap">
              <div class="set-input-label">Wdh.</div>
              <input class="set-input" type="number" inputmode="numeric" placeholder="Wdh."
                value="${st.reps||''}"
                onchange="updateSet('${t}',${ei},${si},'reps',this.value)"
                oninput="updateSet('${t}',${ei},${si},'reps',this.value)">
              <div class="set-target">&nbsp;</div>
            </div>
          </div>
          ${pr ? '<div class="pr-star">🏆</div>' : ''}
        </div>`;
    }

    // notes for today
    const noteVal = (notes[t] && notes[t][TODAY]) || '';

    html += `
      <div class="exercise-card ${isDone?'all-done':''} ${isExp?'expanded':''}" id="ec-${ei}">
        <div class="exercise-header" onclick="toggleExpand('${t}',${ei})">
          <div class="ex-title-wrap">
            <div class="ex-name">${isDone?'✓ ':''}${ex.name}</div>
            <div class="ex-meta">${ex.sets} Sätze × ${ex.reps} · ${doneS}/${ex.sets} Sätze erledigt</div>
          </div>
          <div class="ex-chevron">▼</div>
        </div>
        <div class="sets-container">
          ${instrHtml}
          ${prevHtml}
          ${setsHtml}
        </div>
      </div>`;
  });

  // Notes section
  const noteVal = (notes[t] && notes[t][TODAY]) || '';
  html += `
    <div class="notes-section">
      <label>📝 Notizen zum heutigen Training</label>
      <textarea class="notes-textarea" placeholder="z.B. Rücken war müde, Schulterdrücken mit 50kg, gutes Training..." 
        onchange="saveNote('${t}',this.value)"
        oninput="saveNote('${t}',this.value)">${noteVal}</textarea>
    </div>`;

  // Summary
  html += `
    <div class="summary-card ${allComplete?'complete':''}">
      <div class="summary-emoji">${allComplete?'🎉':'💪'}</div>
      <div class="summary-title">${allComplete?'Training abgeschlossen!':'Los geht\'s!'}</div>
      <div class="summary-sub">${allComplete?'Ausgezeichnet – Muskeln wachsen jetzt.':'Klappe eine Übung auf und starte den ersten Satz.'}</div>
      ${ds>0?`<button class="reset-btn" onclick="resetTraining('${t}')">↺ Training zurücksetzen</button>`:''}
    </div>`;

  document.getElementById('content').innerHTML = html;
}

// ── ACTIONS ─────────────────────────────────────────────
function toggleExpand(t, ei) {
  expanded[t+ei] = !expanded[t+ei];
  renderContent();
}

function toggleSet(t, ei, si) {
  const cur = getSet(t,ei,si);
  setSetData(t,ei,si,{done:!cur.done});
  if (!cur.done) startTimer(); // start timer when marking done
  renderTabs();
  renderContent();
}

function updateSet(t, ei, si, field, val) {
  setSetData(t,ei,si,{[field]:val});
}

function saveNote(t, val) {
  if (!notes[t]) notes[t] = {};
  notes[t][TODAY] = val;
  save();
}

function resetTraining(t) {
  if (state[t]) delete state[t][TODAY];
  save();
  renderTabs();
  renderContent();
}

// ── HISTORY ─────────────────────────────────────────────
function showHistory() {
  const panel = document.getElementById('historyPanel');
  const content = document.getElementById('historyContent');

  let html = '';
  TRAININGS.forEach((t,ti) => {
    const dates = Object.keys(state[t]||{}).sort().reverse().slice(0,8);
    if (!dates.length) return;
    html += `<div class="history-section"><h3>${TNAMES[ti]}</h3>`;
    plan[t].exercises.forEach((ex,ei) => {
      const hist = getExHistory(t,ei);
      if (!hist.length) return;
      html += `<div class="history-ex">
        <div class="history-ex-name">${ex.name}</div>
        <div class="history-rows">
          ${hist.map(h=>`<div class="history-row">
            <span class="date">${h.date}</span>
            <span class="val">${h.val}</span>
          </div>`).join('')}
        </div>
      </div>`;
    });

    // notes
    const noteEntries = Object.entries(notes[t]||{}).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,4);
    if (noteEntries.length) {
      html += `<div class="history-ex"><div class="history-ex-name">📝 Notizen</div><div class="history-rows">
        ${noteEntries.map(([d,n])=>`<div class="history-row" style="flex-direction:column;gap:2px;">
          <span class="date">${d}</span><span style="color:#90b8d8;font-size:11px;">${n}</span>
        </div>`).join('')}
      </div></div>`;
    }

    html += '</div>';
  });

  content.innerHTML = html || '<div class="no-history">Noch keine Trainingshistorie vorhanden.<br><br>Starte dein erstes Training und hake Sätze ab!</div>';
  panel.classList.add('visible');
}
function hideHistory() {
  document.getElementById('historyPanel').classList.remove('visible');
}

// ── INIT ────────────────────────────────────────────────
load();
expanded[activeT+'0'] = true; // auto-open first exercise
renderTabs();
renderContent();
</script>
